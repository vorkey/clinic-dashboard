<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard Antrian Klinik Poliban</title>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <div class="header">
      <img src="logo.png" alt="klinik Poliban" class="logo">

      <h1 class="header-text">Dashboard Antrian Klinik Poliban</h1>
    </div>

    <div class="card">
      <div class="card-title">Antrian dilayani saat ini</div>
      <div id="currentQueues" class="queue-grid"></div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-title">Total antrian hari ini</div>
        <div id="issued" class="stat-value">0</div>
      </div>

      <div class="card">
        <div class="card-title">Jumlah Antrian Menunggu</div>
        <div id="waiting" class="stat-value">0</div>
      </div>

      <div class="card">
        <div class="card-title">Antrian berikutnya</div>
        <div id="next" class="stat-value">0</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Status perangkat</div>
      <div id="devices"></div>
    </div>

    <div class="card">
      <div class="card-title">Riwayat pelayanan</div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Antrian</th>
              <th>Loket</th>
              <th>Tanggal</th>
              <th>Waktu</th>
              <th>Durasi</th>
            </tr>
          </thead>
          <tbody id="history"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="script.js"> </script>
</body>
</html>
